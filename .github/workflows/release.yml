name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v2026.6.0)'
        required: true

permissions:
  contents: read

jobs:
  build:
    name: Build macOS binaries
    runs-on: macos-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: dtolnay/rust-toolchain@67ef31d5b988238dd797d409d6f9574278e20537 # master
        with:
          toolchain: stable
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Install protobuf compiler
        run: brew install protobuf

      - name: Build aarch64-apple-darwin
        run: cargo build --release --target aarch64-apple-darwin

      - name: Build x86_64-apple-darwin
        run: cargo build --release --target x86_64-apple-darwin

      - name: Package
        shell: bash
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          mkdir -p dist
          for TARGET in aarch64-apple-darwin x86_64-apple-darwin; do
            ASSET="lantern-${TAG}-${TARGET}"
            cp "target/${TARGET}/release/lantern" dist/lantern
            tar -czf "dist/${ASSET}.tar.gz" -C dist lantern
            rm dist/lantern
            (cd dist && shasum -a 256 "${ASSET}.tar.gz") >> dist/SHA256SUMS
          done

      - uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: lantern-binaries
          path: dist/
          retention-days: 1

  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4.1.8
        with:
          name: lantern-binaries
          path: dist/

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          if gh release view "${TAG}" >/dev/null 2>&1; then
            EXISTING=$(gh release view "${TAG}" --json assets \
              --jq '[.assets[].name] | map(select(endswith(".tar.gz"))) | length')
            if [ "${EXISTING}" -gt 0 ]; then
              echo "Release ${TAG} already has ${EXISTING} tarball asset(s) — skipping upload"
              gh release view "${TAG}" --json tagName,assets \
                --jq '{tag: .tagName, assets: [.assets[].name]}'
            else
              echo "Release ${TAG} exists without tarball assets — uploading"
              gh release upload "${TAG}" dist/*.tar.gz dist/SHA256SUMS
            fi
          else
            gh release create "${TAG}" \
              --title "Lantern ${TAG}" \
              --generate-notes \
              dist/*.tar.gz \
              dist/SHA256SUMS
          fi
